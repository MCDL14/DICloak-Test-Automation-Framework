# 测试数据配置
test_data:
  # 自动化新建环境名称前缀
  environment_name_prefix: "auto_env"
  # P0 内核场景中 142 环境名称
  kernel_142_environment_name: "142环境"
  # P0 内核场景中 134 环境名称
  kernel_134_environment_name: "134环境"
  # 内核完整性校验数据
  kernel_integrity:
    # 优先校验和打开的 142 内核环境名称
    environment_name: "142内核环境-4"
    # 首行不是目标环境时，在筛选框中输入的关键字
    fallback_search_keyword: "142"
    # 打开环境后等待启动/关闭的浏览器进程名
    browser_process_name: "GinsBrowser.exe"
    # 系统进程里显示的内核进程名称，用于读取版本号
    kernel_process_name: "GinsBrowser"
    # 期望内核版本号前缀
    expected_kernel_prefix: "142"
    # 期望 134 内核版本号前缀
    expected_134_kernel_prefix: "134"
    # 134 内核环境筛选关键字
    kernel_134_search_keyword: "134内核"
    # 需要下载的 134 内核大版本
    kernel_134_download_major: "134"
    # 环境缓存目录下需要清空的子目录
    cache_subdir_name: "browsers"

  # 创建默认配置环境用例数据
  environment_create_default:
    # 用例中创建、打开、关闭、删除的环境名称
    environment_name: "自动化-创建环境"

  # 创建 134 内核环境用例数据
  environment_create_134_kernel:
    # 用例中创建、打开、校验、关闭、删除的环境名称
    environment_name: "自动化-创建134内核环境"
    # 创建环境时在“浏览器内核”下拉框选择的内核
    kernel_label: "ChromeBrowser 134"
    # 打开环境后通过内核 CDP 校验的版本号前缀
    expected_kernel_prefix: "134"

  # 编辑环境名称用例数据
  environment_edit_name:
    # 临时修改后的环境名称；用例结束前会按环境序号还原原始名称
    temporary_name: "自动化-编辑环境名称"

  # 列表快捷修改环境名称用例数据
  environment_quick_edit_name:
    # 通过环境列表名称右侧快捷编辑入口临时修改后的环境名称；用例结束前会按环境序号还原原始名称
    temporary_name: "自动化-列表快捷修改环境名称"

  # 编辑固定打开网址用例数据
  environment_edit_fixed_open_url:
    # 用例会筛选并编辑的预置环境名称；该环境由自动化团队提前准备
    environment_name: "自动化编辑打开网址"
    # 写入“高级设置 - 固定打开网页”的网址
    fixed_url: "https://bilibili.com"
    # 校验内核标签页时使用的 URL 关键字，兼容跳转到 www 子域等情况
    url_keyword: "bilibili.com"

  # 环境列表筛选-自动化分组用例数据
  environment_filter_group:
    # 环境列表“环境分组”筛选框选择的分组名称；用例会校验列表环境分组列均为该值
    group_name: "自动化分组"

  # 环境列表备注筛选用例数据
  environment_filter_remark:
    # 在“序号/名称/备注”筛选框输入的备注关键字；用例会校验列表备注列均包含该关键字
    remark_keyword: "备注UI自动化"

  # 批量创建环境用例数据
  environment_batch_create:
    # 批量创建时填写的环境名称前缀；用例会清理该前缀下的自动化环境
    environment_name_prefix: "自动化-批量创建环境"
    # 批量创建数量
    create_count: 5

  # 批量创建 134 内核环境用例数据
  environment_batch_create_134_kernel:
    # 批量创建时填写的环境名称前缀；用例会清理该前缀下的自动化环境
    environment_name_prefix: "自动化-批量创建134内核环境"
    # 批量创建数量
    create_count: 3
    # 批量创建时在“浏览器内核”下拉框选择的内核
    kernel_label: "ChromeBrowser 134"
    # 打开环境后通过每个内核 CDP 校验的版本号前缀
    expected_kernel_prefix: "134"

  # 书签相关测试数据
  bookmark:
    # 书签文件存放目录
    storage_dir: "test_data/bookmarks"
    # 覆盖书签场景使用的文件名
    overwrite_file_name: "自动化-书签文件-覆盖.html"
    # 追加书签场景使用的文件名
    append_file_name: "自动化-书签文件-追加.html"
    # 覆盖书签场景使用的数据行；可按字符串列表或对象列表维护
    overwrite_rows: ["覆盖书签示例", "自动化测试"]
    # 追加书签场景使用的数据行；可按字符串列表或对象列表维护
    append_rows: ["追加书签示例", "自动化测试"]

  # 成员导出校验数据
  member_export:
    # 预先准备的正确成员文件完整路径
    expected_file_full_path: "test_data/members/自动化-导出成员数据存放.xlsx"
    # APP 导出成员文件的输出目录
    export_dir: "test_data/export"
    # 固定导出文件名；成员导出文件带时间戳时保持为空
    export_file_name: ""
    # 成员导出文件名正则；示例：导出成员列表 - 202604281947.xlsx
    export_file_regex: "^导出成员列表 - \\d{12}\\.xlsx$"

  # 批量导入数据
  batch_import:
    # 批量导入文件所在目录
    file_dir: "test_data/import"
    # 批量导入 xlsx 文件名
    file_name: "自动化-导入环境.xlsx"

  # 导出环境校验数据
  batch_export:
    # 导出环境文件输出目录
    export_dir: "test_data/export"
    # 导出环境保存文件名
    export_file_name: "批量导出环境记录-DICloak.xlsx"

  # 抓包进程拦截验证数据
  packet_capture:
    # 抓包工具进程名；APP 内置功能会基于该进程名阻止打开环境
    process_name: "geek64.exe"
    # 抓包工具启动路径；自动化只负责启动或确认进程存在，不进入工具内部操作
    startup_path: "test_data/Tools/geek.exe"

  # 本地扩展包数据
  local_extension:
    # 本地扩展包文件名
    package_name: "自动化-本地扩展.zip"
    # 本地扩展包所在目录；如果这里直接配置 zip 完整路径，也会兼容
    package_path: "test_data/extensions"
