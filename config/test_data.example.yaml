# 测试数据配置
test_data:
  # 自动化临时数据命名前缀；用例会自动拼接场景名和本次运行 ID，避免同名冲突
  naming:
    prefix: "auto"
  # 内核完整性校验数据
  kernel_integrity:
    # 优先校验和打开的 142 内核环境名称
    environment_name: "142内核环境-4"
    # 首行不是目标环境时，在筛选框中输入的关键字
    fallback_search_keyword: "142"
    # 134 内核环境筛选关键字
    kernel_134_search_keyword: "134内核"

  # 创建多分组环境用例数据
  environment_create_multi_group:
    # 创建环境时需要补充选择的环境分组；如果创建抽屉默认已有分组，用例会保留并一起校验
    group_names: ["分组三", "分组二"]

  # 单环境编辑多分组用例数据
  environment_edit_single_multi_group:
    # 用例会在第一个环境上追加选择并最终取消选择的环境分组
    group_name: "分组二"

  # 批量编辑环境多分组用例数据
  environment_batch_edit_multi_group:
    # 用例会获取并编辑环境列表前 N 个环境
    target_count: 3
    # 批量设置环境分组时，“修改方式=追加”要选择的环境分组
    append_group_name: "分组二"
    # 批量设置环境分组时，“修改方式=覆盖”要选择的环境分组
    overwrite_group_names: ["分组三", "分组二"]
    # 用例最后通过“覆盖”恢复为未分组时选择的分组名称
    reset_group_name: "未分组"

  # 创建带有标签的环境用例数据
  environment_create_with_tags:
    # 创建环境时需要选择的标签名称
    tag_names: ["标签1", "标签2"]

  # 编辑固定打开网址用例数据
  environment_edit_fixed_open_url:
    # 用例会筛选并编辑的预置环境名称；该环境由自动化团队提前准备
    environment_name: "自动化编辑打开网址"
    # 写入“高级设置 - 固定打开网页”的网址
    fixed_url: "https://bilibili.com"
    # 校验内核标签页时使用的 URL 关键字，兼容跳转到 www 子域等情况
    url_keyword: "bilibili.com"

  # 环境列表筛选-自动化分组用例数据
  environment_filter_group:
    # 环境列表“环境分组”筛选框选择的分组名称；用例会校验列表环境分组列均为该值
    group_name: "自动化分组"

  # 环境列表备注筛选用例数据
  environment_filter_remark:
    # 在“序号/名称/备注”筛选框输入的备注关键字；用例会校验列表备注列均包含该关键字
    remark_keyword: "备注UI自动化"

  # 环境列表标签筛选用例数据
  environment_filter_tag:
    # 在“更多筛选”抽屉的“标签”输入框中输入的标签名称；用例会校验列表标签列均包含该标签
    tag_name: "标签2"

  # 批量创建环境用例数据
  environment_batch_create:
    # 批量创建数量
    create_count: 5

  # 批量创建 134 内核环境用例数据
  environment_batch_create_134_kernel:
    # 批量创建数量
    create_count: 3

  # 批量创建多分组环境用例数据
  environment_batch_create_multi_group:
    # 批量创建数量
    create_count: 3
    # 批量创建时需要补充选择的环境分组；如果批量创建抽屉默认已有分组，用例会保留并一起校验
    group_names: ["分组三", "分组二"]

  # 批量创建带有标签的环境用例数据
  environment_batch_create_with_tags:
    # 批量创建数量
    create_count: 3
    # 批量创建时需要选择的标签名称
    tag_names: ["标签1", "标签2"]

  # 批量编辑环境标签用例数据
  environment_batch_edit_tags:
    # 取当前列表前几个环境执行批量编辑
    target_count: 3
    # “追加标签”时选择的标签名称
    append_tag_name: "标签7"
    # “覆盖标签”时选择的标签名称
    overwrite_tag_names: ["标签5", "标签1"]
    # 清空后再次覆盖恢复的标签名称
    final_tag_name: "标签1"

  # 编辑单个环境标签用例数据
  environment_edit_tags:
    # 编辑环境时要新增的标签名称
    target_tag_name: "标签9"

  # 书签相关测试数据
  bookmark:
    # 书签文件存放目录
    storage_dir: "test_data/bookmarks"
    # 覆盖书签场景使用的文件名
    overwrite_file_name: "自动化-书签文件-覆盖.html"
    # 追加书签场景使用的文件名
    append_file_name: "自动化-书签文件-追加.html"
    # 覆盖书签场景使用的数据行；可按字符串列表或对象列表维护
    overwrite_rows: ["覆盖书签示例", "自动化测试"]
    # 追加书签场景使用的数据行；可按字符串列表或对象列表维护
    append_rows: ["追加书签示例", "自动化测试"]

  # 成员导出校验数据
  member_export:
    # 预先准备的正确成员文件完整路径
    expected_file_full_path: "test_data/members/自动化-导出成员数据存放.xlsx"
    # APP 导出成员文件的输出目录
    export_dir: "test_data/export"
    # 固定导出文件名；成员导出文件带时间戳时保持为空
    export_file_name: ""
    # 成员导出文件名正则；示例：导出成员列表 - 202604281947.xlsx
    export_file_regex: "^导出成员列表 - \\d{12}\\.xlsx$"

  # 成员 open API 用例数据；token 建议用 DICLOAK_API_MEMBER_EDIT_TOKEN 环境变量维护
  api_member_edit:
    base_url: "https://app.dicloak.com/gin/v1/api/member/open/edit?"
    token: ""
    external_member_id: "1917463861065080834"
    internal_member:
      member_id: "1947196562844110850"
      username: "MCDL007"
      password: ""
    disuse:
      time: "2026-1-31 12:00:00"
      time_zone: "Etc/GMT-8"
    status_retry:
      times: 3
      interval_seconds: 1

  # 创建自定义代理用例数据；账号/密码建议放本地 config/test_data.yaml 或环境变量
  proxy_custom:
    host: "accel.ipflygates.com"
    port: "5001"
    account: ""
    password: ""

  # 批量导入数据
  batch_import:
    # 批量导入文件所在目录
    file_dir: "test_data/import"
    # 批量导入 xlsx 文件名
    file_name: "自动化-导入环境.xlsx"

  # 导出环境校验数据
  batch_export:
    # 导出环境文件输出目录
    export_dir: "test_data/export"
    # 导出环境保存文件名
    export_file_name: "批量导出环境记录-DICloak.xlsx"

  # 抓包进程拦截验证数据
  packet_capture:
    # 抓包工具进程名；APP 内置功能会基于该进程名阻止打开环境
    process_name: "geek64.exe"
    # 抓包工具启动路径；自动化只负责启动或确认进程存在，不进入工具内部操作
    startup_path: "test_data/Tools/geek.exe"

  # 本地扩展包数据
  local_extension:
    # 本地扩展包文件名
    package_name: "自动化-本地扩展.zip"
    # 本地扩展包所在目录；如果这里直接配置 zip 完整路径，也会兼容
    package_path: "test_data/extensions"
